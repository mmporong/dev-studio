name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build
        env:
          VITE_BASE_PATH: /dev-studio/

      - name: Configure Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0

      - name: Health check deployed site
        run: |
          url="${{ steps.deployment.outputs.page_url }}"
          echo "Health-checking deployed site: $url"
          for i in 1 2 3 4 5; do
            code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 "$url" || echo "000")
            if [ "$code" = "200" ]; then
              echo "Site is live (HTTP 200) on attempt $i"
              {
                echo "### ✅ 배포 헬스체크 통과"
                echo ""
                echo "| 항목 | 값 |"
                echo "| --- | --- |"
                echo "| 배포 URL | $url |"
                echo "| 최종 HTTP 상태 | $code |"
                echo "| 소요 시도 | $i / 5 |"
              } >> "$GITHUB_STEP_SUMMARY"
              exit 0
            fi
            echo "Attempt $i: HTTP $code - retrying in 15s (Pages propagation delay)"
            sleep 15
          done
          echo "Site did not return HTTP 200 after 5 attempts"
          {
            echo "### ❌ 배포 헬스체크 실패"
            echo ""
            echo "| 항목 | 값 |"
            echo "| --- | --- |"
            echo "| 배포 URL | $url |"
            echo "| 최종 HTTP 상태 | $code |"
            echo "| 소요 시도 | 5 / 5 (초과) |"
          } >> "$GITHUB_STEP_SUMMARY"
          exit 1
