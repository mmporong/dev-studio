name: Weekly Insights Collection

on:
  schedule:
    - cron: '0 0 * * 1' # 매주 월요일 00:00 UTC (KST 09:00)
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: weekly-insights
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22

      - run: npm ci

      - name: Fetch insights
        run: npx tsx scripts/fetch-insights.ts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/insights.json
          git diff --cached --quiet || git commit -m "chore: weekly insights update"
          git push

      - name: Telegram notification
        if: always() && env.TELEGRAM_BOT_TOKEN != ''
        env:
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: |
          ARTICLE_COUNT=$(node -e "const d=require('./public/insights.json'); const w=d.weeks[0]; console.log(w ? w.articles.length : 0)")
          python3 -c "
          import urllib.request, json, sys, os
          count = sys.argv[1]
          chat_id = os.environ['TELEGRAM_CHAT_ID']
          bot_token = os.environ['TELEGRAM_BOT_TOKEN']
          msg = f'<b>주간 인사이트 수집 완료</b>\n이번 주 {count}건의 새 글이 수집되었습니다.'
          data = json.dumps({'chat_id': chat_id, 'parse_mode': 'HTML', 'text': msg}).encode('utf-8')
          urllib.request.urlopen(urllib.request.Request(f'https://api.telegram.org/bot{bot_token}/sendMessage', data=data, headers={'Content-Type': 'application/json'}))
          " "$ARTICLE_COUNT"
